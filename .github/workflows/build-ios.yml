name: iOS Unsigned IPA Builder
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NPM Dependencies
        run: npm install

      # NEW — check your package.json "scripts" block for the real name
      # (often "build", sometimes "dist"). If there's no build step needed
      # for your app, delete this.
      - name: Build Frontend Assets
        run: npm run build

      - name: Setup Non-Interactive Keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 7200 build.keychain

      - name: Run xcodebuild Archive
        run: |
          xcodebuild archive \
            -workspace Gemini.xcworkspace \
            -scheme 'Gemini' \
            -archivePath Gemini.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            HEADER_SEARCH_PATHS="\$(OBJROOT)/GeneratedModuleMaps \$(BUILD_DIR)/Release-iphoneos/include" \
            OTHER_SWIFT_FLAGS="-Xfrontend -warn-long-expression-type-checking=300 -Xfrontend -warn-long-function-bodies=300"

      - name: Package into Unsigned IPA (Ipalify)
        run: |
          mkdir -p Payload
          APP_PATH=$(find Gemini.xcarchive -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" Payload/
          else
            echo "Error: Could not find any .app bundle inside Gemini.xcarchive."
            exit 1
          fi
          zip -r Gemini_Web.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Web-Unsigned-IPA
          path: Gemini_Web.ipa
          retention-days: 7