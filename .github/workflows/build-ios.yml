name: iOS Unsigned IPA Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
        
    steps:
      # 1. Checkout the source code from your repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Node.js for your frontend/web assets build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Install frontend web-side bundle assets
      - name: Install NPM Dependencies
        run: npm install

      # 4. Create a non-interactive dummy keychain to satisfy background security checks
      - name: Setup Non-Interactive Keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 7200 build.keychain

      # 5. Compile and archive the iOS app using Xcode 16 (Bypassing Code Signing & catching freezes)
      - name: Run xcodebuild Archive
        run: |
          xcodebuild archive \
            -workspace Gemini.xcworkspace \
            -scheme 'Gemini' \
            -archivePath Gemini.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            OTHER_SWIFT_FLAGS="-Xfrontend -warn-long-expression-type-checking=300 -Xfrontend -warn-long-function-bodies=300"

      # 6. Create Payload folder and dynamically move the app bundle to prevent path mismatch errors
      - name: Package into Unsigned IPA (Ipalify)
        run: |
          echo "Creating staging Payload directory..."
          mkdir -p Payload

          echo "Searching for compiled .app bundle inside Gemini.xcarchive..."
          APP_PATH=$(find Gemini.xcarchive -name "*.app" -type d | head -n 1)

          if [ -n "$APP_PATH" ]; then
            echo "Successfully found application bundle at: $APP_PATH"
            # Copying the app directory recursively into Payload folder
            cp -R "$APP_PATH" Payload/
          else
            echo "Error: Could not find any .app bundle inside Gemini.xcarchive. Build may have failed silently."
            exit 1
          fi

          echo "Packaging Payload folder into Gemini_Web.ipa..."
          zip -r Gemini_Web.ipa Payload

      # 7. Upload the generated .ipa installer package as a GitHub Actions workflow artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Web-Unsigned-IPA
          path: Gemini_Web.ipa
          retention-days: 7
