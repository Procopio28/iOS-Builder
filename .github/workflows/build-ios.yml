name: "Build iOS app"

on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      # Step 1: Install node dependencies since package.json exists
      - name: Install Node dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      # Step 2: Build and Archive with explicit signing bypass overrides
      - name: build archive and ipaify
        run: |
          xcodebuild archive \
            -workspace Gemini.xcworkspace \
            -scheme 'Gemini' \
            -archivePath Gemini.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

          mkdir Payload
          mv Gemini.xcarchive/Products/Applications/Gemini.app Payload/Gemini.app

          # Set display name to Gemini Web
          DISPLAY_NAME="Gemini Web"
          if [ "$DISPLAY_NAME" != "Gemini" ] && [ -n "$DISPLAY_NAME" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $DISPLAY_NAME" "Payload/Gemini.app/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleName $DISPLAY_NAME" "Payload/Gemini.app/Info.plist"
          fi

          zip -r "Gemini Web.ipa" "Payload"
          mv "Gemini Web.ipa" "${{ runner.temp }}/Gemini Web.ipa"

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: GeminiWeb
          path: ${{ runner.temp }}/Gemini Web.ipa
          retention-days: 3
